<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Páginas Native</title>

<link rel="icon" href="a3.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#041c16;
--card:#072a22;
--border:#0f4d3f;
--text:#e8fffa;
--muted:#7fb3a8;
--accent:#37c8a3;
}

:root.light{
--bg:#f5fbf9;
--card:#ffffff;
--border:#e3efec;
--text:#0b2b24;
--muted:#6c9087;
--accent:#1fa37f;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Poppins',system-ui;
background:var(--bg);
color:var(--text);
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand img{
width:38px;
}

.brand-title{
font-size:20px;
font-weight:600;
}

.controls{
display:flex;
gap:10px;
}

input{
padding:10px 14px;
border-radius:8px;
border:1px solid var(--border);
background:var(--card);
color:var(--text);
font-family:'Poppins';
}

button{
padding:10px 12px;
border-radius:8px;
border:1px solid var(--border);
background:var(--card);
color:var(--text);
cursor:pointer;
}

/* FILTERS */

.filters{
display:flex;
gap:8px;
margin-bottom:15px;
flex-wrap:wrap;
}

.chip{
padding:6px 14px;
border-radius:999px;
font-size:12px;
border:1px solid var(--border);
cursor:pointer;
background:var(--card);
}

.chip.active{
background:var(--accent);
border:none;
color:white;
}

/* STATS */

.stats{
margin-bottom:15px;
font-size:13px;
color:var(--muted);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:16px;
}

/* CARD */

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
padding:18px;
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
border-color:var(--accent);
}

/* BADGE */

.badge{
display:inline-flex;
align-items:center;
gap:6px;
font-size:11px;
padding:5px 12px;
border-radius:999px;
font-weight:600;
color:white;
margin-bottom:12px;
}

.badge-ed{
background:linear-gradient(135deg,#c084fc,#9333ea);
}

.badge-diabetes{
background:linear-gradient(135deg,#f87171,#ef4444);
}

.badge-memoria{
background:linear-gradient(135deg,#60a5fa,#3b82f6);
}

.name{
font-weight:500;
font-size:18px;
margin-bottom:6px;
}

.path{
font-size:12px;
color:var(--muted);
margin-bottom:14px;
}

.actions{
display:flex;
gap:8px;
}

.btn{
flex:1;
padding:8px;
border-radius:8px;
border:1px solid var(--border);
cursor:pointer;
font-size:12px;
text-align:center;
}

.open{
background:var(--accent);
border:none;
color:white;
}

/* PAGINATION */

.pagination{
margin-top:25px;
display:flex;
justify-content:center;
gap:6px;
flex-wrap:wrap;
}

.page-btn{
padding:6px 10px;
border-radius:6px;
border:1px solid var(--border);
cursor:pointer;
font-size:12px;
}

.page-btn.active{
background:var(--accent);
border:none;
color:white;
}

/* PREVIEW */

.preview{
position:fixed;
width:340px;
height:420px;
border-radius:10px;
overflow:hidden;
border:1px solid var(--border);
box-shadow:0 10px 30px rgba(0,0,0,.35);
background:#fff;
pointer-events:none;
opacity:0;
z-index:999;
}

.preview-inner{
width:1200px;
height:900px;
transform:scale(.28);
transform-origin:top left;
}

.preview iframe{
width:1200px;
height:900px;
border:none;
}

/* TOAST */

.toast{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:var(--card);
border:1px solid var(--border);
padding:8px 16px;
border-radius:8px;
opacity:0;
font-size:13px;
}

.toast.show{
opacity:1;
}

.footer{
text-align:center;
margin-top:40px;
font-size:13px;
color:var(--muted);
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="brand">
<img src="a3.png">
<div class="brand-title">Páginas Native</div>
</div>

<div class="controls">
<input id="search" placeholder="Buscar página...">
<button id="theme">🌙</button>
</div>

</div>

<div class="filters">

<div class="chip active" data-tag="all">Todas</div>
<div class="chip" data-tag="ED">⚡ ED</div>
<div class="chip" data-tag="Diabetes">🩸 Diabetes</div>
<div class="chip" data-tag="Memória">🧠 Memória</div>

</div>

<div class="stats" id="stats"></div>

<div id="grid" class="grid"></div>

<div id="pagination" class="pagination"></div>

<div class="footer">
nativehub.space
</div>

</div>

<div id="toast" class="toast">Link copiado</div>

<div id="preview" class="preview">
<div class="preview-inner">
<iframe id="previewFrame"></iframe>
</div>
</div>

<script>

const BASE_URL="https://nativehub.space/"
const CARDS_PER_PAGE=25

const folders=[
"CBS",
"CNN",
"edv2",
"edv2loira",
"edv3",
"edv1loira",
"edv1mix",
"edv3loira",
"foxnews"
]

function detectTag(name){

const n=name.toLowerCase()

if(n.includes("ed")) return {tag:"ED",emoji:"⚡",class:"badge-ed"}
if(n.includes("cnn")||n.includes("fox")) return {tag:"Diabetes",emoji:"🩸",class:"badge-diabetes"}
if(n.includes("cbs")) return {tag:"Memória",emoji:"🧠",class:"badge-memoria"}

return {tag:"",emoji:"",class:""}

}

const pages=folders.map(f=>{
const tag=detectTag(f)
return{
name:f,
path:f+"/",
tag:tag.tag,
emoji:tag.emoji,
tagClass:tag.class
}
})

const grid=document.getElementById("grid")
const search=document.getElementById("search")
const stats=document.getElementById("stats")
const pagination=document.getElementById("pagination")

const preview=document.getElementById("preview")
const frame=document.getElementById("previewFrame")
const toast=document.getElementById("toast")

let activeTag="all"
let timer=null
let currentPage=1

document.querySelectorAll(".chip").forEach(chip=>{
chip.onclick=()=>{
document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"))
chip.classList.add("active")
activeTag=chip.dataset.tag
currentPage=1
render()
}
})

function showToast(){
toast.classList.add("show")
setTimeout(()=>toast.classList.remove("show"),1200)
}

function render(){

const q=search.value.toLowerCase()

const filtered=pages.filter(p=>{
const nameMatch=p.name.toLowerCase().includes(q)
const tagMatch=activeTag==="all"||p.tag===activeTag
return nameMatch&&tagMatch
})

const totalPages=Math.ceil(filtered.length/CARDS_PER_PAGE)

const start=(currentPage-1)*CARDS_PER_PAGE
const list=filtered.slice(start,start+CARDS_PER_PAGE)

stats.innerText=`${filtered.length} páginas • página ${currentPage} de ${totalPages||1}`

grid.innerHTML=""

list.forEach(p=>{

const el=document.createElement("div")
el.className="card"

el.innerHTML=`

<div class="badge ${p.tagClass}">
${p.emoji} ${p.tag}
</div>

<div class="name">${p.name}</div>
<div class="path">${p.path}</div>

<div class="actions">
<a class="btn open" href="${BASE_URL+p.path}" target="_blank">Abrir</a>
<button class="btn copy">Copiar</button>
</div>
`

el.querySelector(".copy").onclick=()=>{
navigator.clipboard.writeText(BASE_URL+p.path)
showToast()
}

el.onmouseenter=()=>{
timer=setTimeout(()=>{
frame.src=BASE_URL+p.path
preview.style.opacity=1
},300)
}

el.onmousemove=(e)=>{
preview.style.left=(e.clientX+20)+"px"
preview.style.top=(e.clientY+20)+"px"
}

el.onmouseleave=()=>{
clearTimeout(timer)
preview.style.opacity=0
frame.src=""
}

grid.appendChild(el)

})

pagination.innerHTML=""

for(let i=1;i<=totalPages;i++){

const btn=document.createElement("div")
btn.className="page-btn"+(i===currentPage?" active":"")

btn.innerText=i

btn.onclick=()=>{
currentPage=i
render()
window.scrollTo({top:0,behavior:"smooth"})
}

pagination.appendChild(btn)

}

}

search.oninput=()=>{
currentPage=1
render()
}

render()

const themeBtn=document.getElementById("theme")

function setTheme(t){
document.documentElement.classList.toggle("light",t==="light")
localStorage.setItem("theme",t)
themeBtn.innerText=t==="light"?"🌙":"☀️"
}

themeBtn.onclick=()=>{
const t=document.documentElement.classList.contains("light")?"light":"dark"
setTheme(t==="light"?"dark":"light")
}

setTheme(localStorage.getItem("theme")||"dark")

</script>

</body>
</html>
