<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Páginas Native</title>
    <link rel="icon" href="a3.png">

    <style>
        :root {
            --bg: #041c16;
            --card: #072a22;
            --border: #0f4d3f;
            --text: #e8fffa;
            --muted: #7fb3a8;
            --accent: #37c8a3;
        }

        :root.light {
            --bg: #f5fbf9;
            --card: #ffffff;
            --border: #e3efec;
            --text: #0b2b24;
            --muted: #6c9087;
            --accent: #1fa37f;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand img {
            width: 50px;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
        }

        button {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
        }

        .stats {
            margin-bottom: 15px;
            color: var(--muted);
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn .35s ease forwards;
        }

        .card:hover {
            border-color: var(--accent);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .name {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .path {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 13px;
            text-align: center;
        }

        .open {
            background: var(--accent);
            border: none;
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 8px;
            opacity: 0;
            transition: .3s;
        }

        .toast.show {
            opacity: 1;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 13px;
            color: var(--muted);
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="header">

            <div class="brand">
                <img src="a3.png">
                <div class="brand-title">Páginas Native</div>
            </div>

            <div class="controls">
                <input id="search" placeholder="Buscar...">
                <button id="theme">🌙</button>
            </div>

        </div>

        <div class="stats">
            <span id="count"></span>
        </div>

        <div id="grid" class="grid"></div>

        <div class="footer">
            nativehub.space
        </div>

    </div>

    <div id="toast" class="toast">Link copiado</div>

    <script>
        const folders = [

            "cbs",
            "cnn",
            "edv2",
            "edv2loira",
            "edv3",
            "edv1loira",
            "edv1mix",
            "edv3loira",
            "foxnews"

        ]

        const pages = folders.map(f => ({
            name: f,
            path: f + "/"
        }))

        const grid = document.getElementById("grid")
        const search = document.getElementById("search")
        const count = document.getElementById("count")
        const toast = document.getElementById("toast")

        function showToast() {
            toast.classList.add("show")
            setTimeout(() => toast.classList.remove("show"), 1500)
        }

        function render() {

            const q = search.value.toLowerCase()

            let list = pages.filter(p =>
                p.name.toLowerCase().includes(q) ||
                p.path.toLowerCase().includes(q)
            )

            list = list.sort((a, b) => a.name.localeCompare(b.name))

            grid.innerHTML = ""

            count.innerText = list.length + " páginas"

            list.forEach(p => {

                const el = document.createElement("div")
                el.className = "card"

                el.innerHTML = `

<div class="name">${p.name}</div>
<div class="path">${p.path}</div>

<div class="actions">

<a class="btn open" href="${p.path}" target="_blank">Abrir</a>

<button class="btn copy">Copiar</button>

</div>
`

                el.querySelector(".copy").onclick = () => {

                    const url = "https://nativehub.space/" + p.path

                    navigator.clipboard.writeText(url)

                    showToast()

                }

                grid.appendChild(el)

            })

        }

        search.oninput = render

        render()

        const themeBtn = document.getElementById("theme")

        function setTheme(t) {
            document.documentElement.classList.toggle("light", t === "light")
            localStorage.setItem("theme", t)
            themeBtn.innerText = t === "light" ? "🌙" : "☀️"
        }

        themeBtn.onclick = () => {
            const t = document.documentElement.classList.contains("light") ? "light" : "dark"
            setTheme(t === "light" ? "dark" : "light")
        }

        setTheme(localStorage.getItem("theme") || "dark")

        document.addEventListener("keydown", e => {
            if ((e.metaKey || e.ctrlKey) && e.key === "k") {
                e.preventDefault()
                search.focus()
            }
        })
    </script>

</body>

</html>
