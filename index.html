<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Páginas Native</title>

<link rel="icon" href="a3.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#041c16;
--card:#072a22;
--border:#0f4d3f;
--text:#e8fffa;
--muted:#7fb3a8;
--accent:#37c8a3;
}

:root.light{
--bg:#f5fbf9;
--card:#ffffff;
--border:#e3efec;
--text:#0b2b24;
--muted:#6c9087;
--accent:#1fa37f;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:'Poppins',system-ui;
background:var(--bg);
color:var(--text);
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand img{
width:44px;
}

.brand-title{
font-size:22px;
font-weight:600;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
}

input{
padding:10px 14px;
border-radius:8px;
border:1px solid var(--border);
background:var(--card);
color:var(--text);
font-family:'Poppins';
}

button{
padding:10px 12px;
border-radius:8px;
border:1px solid var(--border);
background:var(--card);
color:var(--text);
cursor:pointer;
font-family:'Poppins';
}

/* FILTER CHIPS */

.filters{
display:flex;
gap:8px;
margin-bottom:18px;
flex-wrap:wrap;
}

.chip{
padding:6px 14px;
border-radius:999px;
font-size:12px;
border:1px solid var(--border);
cursor:pointer;
background:var(--card);
transition:.2s;
}

.chip:hover{
border-color:var(--accent);
}

.chip.active{
background:var(--accent);
border:none;
color:white;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:18px;
}

/* CARD */

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
padding:18px;
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
border-color:var(--accent);
}

/* BADGE */

.badge{
display:inline-flex;
align-items:center;
gap:6px;
font-size:11px;
padding:5px 12px;
border-radius:999px;
font-weight:600;
color:white;
margin-bottom:12px;
box-shadow:
0 4px 10px rgba(0,0,0,.25),
inset 0 1px 0 rgba(255,255,255,.15);
}

.badge-ed{
background:linear-gradient(135deg,#c084fc,#9333ea);
box-shadow:0 4px 14px rgba(168,85,247,.45);
}

.badge-diabetes{
background:linear-gradient(135deg,#f87171,#ef4444);
box-shadow:0 4px 14px rgba(239,68,68,.45);
}

.badge-memoria{
background:linear-gradient(135deg,#60a5fa,#3b82f6);
box-shadow:0 4px 14px rgba(59,130,246,.45);
}

.name{
font-weight:500;
font-size:18px;
margin-bottom:6px;
}

.path{
font-size:12px;
color:var(--muted);
margin-bottom:14px;
}

.actions{
display:flex;
gap:8px;
}

.btn{
flex:1;
padding:8px;
border-radius:8px;
border:1px solid var(--border);
cursor:pointer;
font-size:12px;
text-align:center;
}

.open{
background:var(--accent);
border:none;
color:white;
}

/* PREVIEW */

.preview{
position:fixed;
width:300px;
border-radius:12px;
overflow:hidden;
border:1px solid var(--border);
box-shadow:0 12px 40px rgba(0,0,0,.4);
background:#000;
pointer-events:none;
opacity:0;
transition:.15s;
z-index:999;
}

.browser-bar{
height:26px;
background:#1f1f1f;
display:flex;
align-items:center;
gap:6px;
padding-left:10px;
}

.browser-dot{
width:9px;
height:9px;
border-radius:50%;
}

.dot-red{background:#ff5f57}
.dot-yellow{background:#febc2e}
.dot-green{background:#28c840}

.preview-inner{
width:1280px;
height:800px;
transform:scale(.22);
transform-origin:top left;
}

.preview iframe{
width:1280px;
height:800px;
border:none;
}

/* TOAST */

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:var(--card);
border:1px solid var(--border);
padding:8px 16px;
border-radius:8px;
opacity:0;
transition:.3s;
font-size:13px;
}

.toast.show{
opacity:1;
}

.footer{
text-align:center;
margin-top:40px;
font-size:13px;
color:var(--muted);
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="brand">
<img src="a3.png">
<div class="brand-title">Páginas Native</div>
</div>

<div class="controls">
<input id="search" placeholder="Buscar página...">
<button id="theme">🌙</button>
</div>

</div>

<div class="filters">

<div class="chip active" data-tag="all">Todas</div>
<div class="chip" data-tag="ED">⚡ ED</div>
<div class="chip" data-tag="Diabetes">🩸 Diabetes</div>
<div class="chip" data-tag="Memória">🧠 Memória</div>

</div>

<div class="stats">
<span id="count"></span>
</div>

<div id="grid" class="grid"></div>

<div class="footer">
nativehub.space
</div>

</div>

<div id="toast" class="toast">Link copiado</div>

<div id="preview" class="preview">

<div class="browser-bar">
<div class="browser-dot dot-red"></div>
<div class="browser-dot dot-yellow"></div>
<div class="browser-dot dot-green"></div>
</div>

<div class="preview-inner">
<iframe id="previewFrame"></iframe>
</div>

</div>

<script>

const BASE_URL="https://nativehub.space/"

const folders=[
"CBS",
"CNN",
"edv2",
"edv2loira",
"edv3",
"edv1loira",
"edv1mix",
"edv3loira",
"foxnews"
]

function detectTag(name){

const n=name.toLowerCase()

if(n.includes("ed")) return {tag:"ED",emoji:"⚡",class:"badge-ed"}
if(n.includes("cnn")||n.includes("fox")) return {tag:"Diabetes",emoji:"🩸",class:"badge-diabetes"}
if(n.includes("cbs")) return {tag:"Memória",emoji:"🧠",class:"badge-memoria"}

return {tag:"",emoji:"",class:""}

}

const pages=folders.map(f=>{

const tag=detectTag(f)

return{
name:f,
path:f+"/",
tag:tag.tag,
emoji:tag.emoji,
tagClass:tag.class
}

})

const grid=document.getElementById("grid")
const search=document.getElementById("search")
const count=document.getElementById("count")
const toast=document.getElementById("toast")

const preview=document.getElementById("preview")
const frame=document.getElementById("previewFrame")

let previewTimer=null
let activeTag="all"

/* chips */

document.querySelectorAll(".chip").forEach(chip=>{

chip.onclick=()=>{

document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"))

chip.classList.add("active")

activeTag=chip.dataset.tag

render()

}

})

/* toast */

function showToast(){

toast.classList.add("show")

setTimeout(()=>{
toast.classList.remove("show")
},1500)

}

/* render */

function render(){

const q=search.value.toLowerCase()

let list=pages.filter(p=>{

const matchName=p.name.toLowerCase().includes(q)
const matchTag=(activeTag==="all"||p.tag===activeTag)

return matchName && matchTag

})

grid.innerHTML=""

count.innerText=list.length+" páginas"

list.forEach(p=>{

const el=document.createElement("div")
el.className="card"

el.innerHTML=`

<div class="badge ${p.tagClass}">
${p.emoji} ${p.tag}
</div>

<div class="name">${p.name}</div>
<div class="path">${p.path}</div>

<div class="actions">

<a class="btn open" href="${BASE_URL+p.path}" target="_blank">Abrir</a>

<button class="btn copy">Copiar</button>

</div>
`

el.querySelector(".copy").onclick=()=>{

navigator.clipboard.writeText(BASE_URL+p.path)

showToast()

}

/* preview */

el.onmouseenter=(e)=>{

previewTimer=setTimeout(()=>{

frame.src=BASE_URL+p.path
preview.style.opacity=1

},300)

}

el.onmousemove=(e)=>{

preview.style.left=(e.clientX+20)+"px"
preview.style.top=(e.clientY+20)+"px"

}

el.onmouseleave=()=>{

clearTimeout(previewTimer)

preview.style.opacity=0
frame.src=""

}

grid.appendChild(el)

})

}

search.oninput=render

render()

/* theme */

const themeBtn=document.getElementById("theme")

function setTheme(t){
document.documentElement.classList.toggle("light",t==="light")
localStorage.setItem("theme",t)
themeBtn.innerText=t==="light"?"🌙":"☀️"
}

themeBtn.onclick=()=>{
const t=document.documentElement.classList.contains("light")?"light":"dark"
setTheme(t==="light"?"dark":"light")
}

setTheme(localStorage.getItem("theme")||"dark")

</script>

</body>

</html>
