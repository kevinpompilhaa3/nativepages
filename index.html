<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Páginas Native</title>

<link rel="icon" href="a3.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#041c16;
--card:#072a22;
--border:#0f4d3f;
--text:#e8fffa;
--muted:#7fb3a8;
--accent:#37c8a3;
}

:root.light{
--bg:#f5fbf9;
--card:#ffffff;
--border:#e3efec;
--text:#0b2b24;
--muted:#6c9087;
--accent:#1fa37f;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Poppins',system-ui;
background:var(--bg);
color:var(--text);
}

.container{
max-width:1400px;
margin:auto;
padding:40px 20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand img{width:38px;}
.brand-title{font-size:20px;font-weight:600;}

.controls{display:flex;gap:10px;}

input,button{
padding:10px 12px;
border-radius:8px;
border:1px solid var(--border);
background:var(--card);
color:var(--text);
font-family:'Poppins';
cursor:pointer;
}

/* FILTERS */

.filters{
display:flex;
gap:8px;
margin-bottom:15px;
flex-wrap:wrap;
}

.chip{
padding:6px 14px;
border-radius:999px;
font-size:12px;
border:1px solid var(--border);
cursor:pointer;
background:var(--card);
}

.chip.active{
background:var(--accent);
border:none;
color:white;
}

/* GRID */

.layout{
display:grid;
grid-template-columns:1fr 420px;
gap:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:16px;
}

.card{
position:relative;
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
padding:18px;
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
border-color:var(--accent);
}

/* FAVORITE */

.star{
position:absolute;
top:10px;
right:12px;
font-size:18px;
cursor:pointer;
opacity:.5;
}

.star.active{
opacity:1;
}

/* BADGES */

.badge{
display:inline-flex;
align-items:center;
gap:6px;
font-size:11px;
padding:5px 12px;
border-radius:999px;
font-weight:600;
color:white;
margin-bottom:12px;
}

.badge-ed{background:linear-gradient(135deg,#c084fc,#9333ea);}
.badge-diabetes{background:linear-gradient(135deg,#f87171,#ef4444);}
.badge-memoria{background:linear-gradient(135deg,#60a5fa,#3b82f6);}
.badge-weight{background:linear-gradient(135deg,#f59e0b,#ef4444);}

.name{font-weight:500;font-size:18px;margin-bottom:6px;}
.path{font-size:12px;color:var(--muted);margin-bottom:14px;}

.actions{display:flex;gap:8px;}

.btn{
flex:1;
padding:8px;
border-radius:8px;
border:1px solid var(--border);
font-size:12px;
text-align:center;
}

.open{
background:var(--accent);
border:none;
color:white;
}

/* PREVIEW */

.preview-panel{
position:sticky;
top:40px;
border:1px solid var(--border);
border-radius:12px;
overflow:hidden;
background:#fff;
height:520px;
}

.preview-panel iframe{
width:1200px;
height:900px;
transform:scale(.36);
transform-origin:top left;
border:none;
}

/* PAGINATION */

.pagination{
margin-top:25px;
display:flex;
justify-content:center;
gap:6px;
flex-wrap:wrap;
}

.page-btn{
padding:6px 10px;
border-radius:6px;
border:1px solid var(--border);
cursor:pointer;
}

.page-btn.active{
background:var(--accent);
border:none;
color:white;
}

/* TOAST */

.toast{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:var(--card);
border:1px solid var(--border);
padding:8px 16px;
border-radius:8px;
opacity:0;
}

.toast.show{opacity:1;}

</style>

</head>

<body>

<div class="container">

<div class="header">
<div class="brand">
<img src="a3.png">
<div class="brand-title">Páginas Native</div>
</div>

<div class="controls">
<input id="search" placeholder="Buscar...">
<button id="theme">🌙</button>
</div>
</div>

<div class="filters">
<div class="chip active" data-tag="all">Todas</div>
<div class="chip" data-tag="favorites">⭐ Favoritos</div>
<div class="chip" data-tag="ED">⚡ ED</div>
<div class="chip" data-tag="Diabetes">🩸 Diabetes</div>
<div class="chip" data-tag="Memória">🧠 Memória</div>
<div class="chip" data-tag="Emagrecimento">🔥 Emagrecimento</div>
</div>

<div id="stats"></div>

<div class="layout">
<div>
<div id="grid" class="grid"></div>
<div id="pagination" class="pagination"></div>
</div>

<div class="preview-panel">
<iframe id="frame"></iframe>
</div>
</div>

</div>

<div id="toast" class="toast">Link copiado</div>

<script>

const BASE_URL="https://nativehub.space/"
const API_URL="https://api.github.com/repos/kevinpompilhaa3/nativepages/contents/"
const CARDS_PER_PAGE=25

let pages=[]
let currentPage=1
let activeTag="all"

let favorites=JSON.parse(localStorage.getItem("favorites")||"[]")

function saveFav(){
localStorage.setItem("favorites",JSON.stringify(favorites))
}

function detectTag(name){

const n=name.toLowerCase()

if(n.includes("ed")) return {tag:"ED",emoji:"⚡",class:"badge-ed"}
if(n.includes("cnn")||n.includes("fox")) return {tag:"Diabetes",emoji:"🩸",class:"badge-diabetes"}
if(n.includes("cbs")) return {tag:"Memória",emoji:"🧠",class:"badge-memoria"}
if(n.includes("white")||n.includes("fit")||n.includes("slim"))
return {tag:"Emagrecimento",emoji:"🔥",class:"badge-weight"}

return {tag:"",emoji:"",class:""}

}

async function loadFolders(){
const res=await fetch(API_URL)
const data=await res.json()
return data.filter(i=>i.type==="dir").map(i=>i.name)
}

async function init(){

const folders=await loadFolders()

pages=folders.map(f=>{
const tag=detectTag(f)
return{
name:f,
path:f+"/",
tag:tag.tag,
emoji:tag.emoji,
tagClass:tag.class
}
})

render()

}

function render(){

const q=document.getElementById("search").value.toLowerCase()

let filtered=pages.filter(p=>p.name.toLowerCase().includes(q))

if(activeTag==="favorites"){
filtered=filtered.filter(p=>favorites.includes(p.name))
}else if(activeTag!=="all"){
filtered=filtered.filter(p=>p.tag===activeTag)
}

filtered.sort((a,b)=>{
const fa=favorites.includes(a.name)?-1:1
const fb=favorites.includes(b.name)?-1:1
return fa-fb
})

const totalPages=Math.ceil(filtered.length/CARDS_PER_PAGE)
const start=(currentPage-1)*CARDS_PER_PAGE
const list=filtered.slice(start,start+CARDS_PER_PAGE)

document.getElementById("stats").innerText=`${filtered.length} páginas • página ${currentPage} de ${totalPages||1}`

const grid=document.getElementById("grid")
grid.innerHTML=""

list.forEach(p=>{

const isFav=favorites.includes(p.name)

const el=document.createElement("div")
el.className="card"

el.innerHTML=`
<div class="star ${isFav?"active":""}">⭐</div>

<div class="badge ${p.tagClass}">
${p.emoji} ${p.tag}
</div>

<div class="name">${p.name}</div>
<div class="path">${p.path}</div>

<div class="actions">
<a class="btn open" href="${BASE_URL+p.path}" target="_blank">Abrir</a>
<button class="btn copy">Copiar</button>
</div>
`

el.querySelector(".copy").onclick=()=>{
navigator.clipboard.writeText(BASE_URL+p.path)
showToast()
}

el.querySelector(".star").onclick=(e)=>{
e.stopPropagation()

if(favorites.includes(p.name)){
favorites=favorites.filter(x=>x!==p.name)
}else{
favorites.push(p.name)
}

saveFav()
render()
}

el.onmouseenter=()=>{
document.getElementById("frame").src=BASE_URL+p.path
}

grid.appendChild(el)

})

const pagination=document.getElementById("pagination")
pagination.innerHTML=""

for(let i=1;i<=totalPages;i++){
const btn=document.createElement("div")
btn.className="page-btn"+(i===currentPage?" active":"")
btn.innerText=i
btn.onclick=()=>{
currentPage=i
render()
}
pagination.appendChild(btn)
}

}

function showToast(){
const t=document.getElementById("toast")
t.classList.add("show")
setTimeout(()=>t.classList.remove("show"),1000)
}

document.getElementById("search").oninput=()=>{
currentPage=1
render()
}

document.querySelectorAll(".chip").forEach(c=>{
c.onclick=()=>{
document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"))
c.classList.add("active")
activeTag=c.dataset.tag
currentPage=1
render()
}
})

const themeBtn=document.getElementById("theme")

function setTheme(t){
document.documentElement.classList.toggle("light",t==="light")
localStorage.setItem("theme",t)
themeBtn.innerText=t==="light"?"🌙":"☀️"
}

themeBtn.onclick=()=>{
const t=document.documentElement.classList.contains("light")?"light":"dark"
setTheme(t==="light"?"dark":"light")
}

setTheme(localStorage.getItem("theme")||"dark")

init()

</script>

</body>
</html>
